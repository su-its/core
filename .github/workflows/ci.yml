name: CI
on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - LICENSE
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - LICENSE
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-node
      - run: vp check

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-node
      - run: vp test

  drizzle-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-node
      - run: npm run db:generate
      - name: Check for uncommitted schema changes
        run: |
          if [ -n "$(git status --porcelain drizzle/)" ]; then
            echo "::error::Drizzle schema and generated files are out of sync. Run 'npm run db:generate' and commit the result."
            git add -N drizzle/
            git diff drizzle/
            exit 1
          fi

  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-node
      - name: Create test env file
        run: |
          cat <<'EOF' > .env.test
          POSTGRES_HOST=localhost
          POSTGRES_USER=core_test
          POSTGRES_PASSWORD=core_test
          POSTGRES_DB=core_test
          POSTGRES_PORT=5433
          EOF
      - run: docker compose --env-file .env.test -f docker-compose.test.yml up -d --wait
      - run: npm run test:integration
      - if: always()
        run: docker compose --env-file .env.test -f docker-compose.test.yml down

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-node
      - run: vp pack
